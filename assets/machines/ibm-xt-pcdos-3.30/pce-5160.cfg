# pce-5160.cfg

path = "."
path = "data/rom"

include? "local.inc"

cfg.model		?= "5160"
cfg.pcex		?= false
cfg.patch		?= true
cfg.cpu			?= "8088"
cfg.speed		?= cfg.pcex ? 0 : 1
cfg.ram			?= 512K
cfg.boot		?= 128
cfg.memtest		?= false
cfg.sound		?= true

cfg.bios.addr		?= 0xf0000
cfg.bios		?= "ibm-xt-1986-05-09.rom"

cfg.ega_bios		?= "ibm-ega-1984-09-13.rom"
cfg.vga_bios		?= "ibm-vga-1986-10-27.rom"

cfg.fdc			?= true
cfg.fdc.accurate	?= (cfg.speed == 1)
cfg.fdc.eot		?= true

cfg.hdc			?= !cfg.pcex
cfg.hdc.bios		?= "ibm-mfm-1985-10-28.rom"
cfg.hdc.switches	?= 0x0a
cfg.hd0.cow		?= false
cfg.hd1.cow		?= false

cfg.ser1.driver		?= "stdio:file=ser1.out:flush=1"
cfg.ser2.driver		?= "mouse:protocol=microsoft:xmul=1:ymul=1"
cfg.ser2.multichar	?= 4

cfg.par1.driver		?= "stdio:file=par1.out:flush=1"

cfg.speaker.driver	?= "sdl:lowpass=0"
cfg.speaker.volume	?= 250
cfg.speaker.lowpass	?= 8000
cfg.speaker.srate	?= 44100

cfg.pcex.addr		?= 0xcf000

include "data/pce-ibmpc.inc"

rom {
	address = 0xcf000
	size    = 4K
	default = 0xff
}
