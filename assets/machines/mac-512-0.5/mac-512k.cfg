# mac-512k.cfg

path = "."
path = "rom"

cfg.sony ?= 0

cpu {
	model = "68000"
	speed = 1
}

ram {
	address = 0x000000
	size    = 512K
}

rom {
	file    = "mac-512k.rom"
	address = 0x400000
	size    = 64K
}

if (cfg.sony) {
	rom {
		file    = "macplus-pcex.rom"
		address = 0xf80000
		size    = 16K
	}
}

keyboard {
	model = 7
	intl  = 0
}

rtc {
	file     = "mac-512k-pram.dat"
	realtime = 1
}

if (cfg.sony) {
	sony {
		enable         = 1
		insert_delay   = 2
		insert_delay_1 = 1
	}
}

iwm {
	drive {
		drive        = 1
		disk         = 1
		inserted     = 1
		single_sided = 1
		auto_rotate  = 1
	}

	drive {
		drive        = 2
		disk         = 2
		inserted     = 0
		single_sided = 1
		auto_rotate  = 1
	}
}

serial {
	port = 0

#	driver = "null"
#	driver = "posix:file=ser_a.out"
#	driver = "pty:symlink=ser_a"
	driver = "stdio:file=ser_a.out"
#	driver = "tcp:port=5556"
#	driver = "tios:file=/dev/ttyS0:log=ser_a.log"
}

serial {
	port = 1

	driver = "stdio:file=ser_b.out"
}

terminal {
	driver = "sdl"

#	escape = "CtrlRight"

	scale    = 2
	border   = 0

	aspect_x = 3
	aspect_y = 2
}

terminal {
	driver = "x11"

#	escape = "CtrlRight"

	scale = 2

	aspect_x = 3
	aspect_y = 2
}

disk {
	drive    = 1
	type     = "auto"
	optional = 1
	file     = "fd1.pri"
	file     = "fd1.woz"
	file     = "fd1.image"
	file     = "fd1.psi"
	file     = "fd1.img"
}

disk {
	drive    = 2
	type     = "auto"
	optional = 1
	file     = "fd2.pri"
	file     = "fd2.woz"
	file     = "fd2.image"
	file     = "fd2.psi"
	file     = "fd2.img"
}

disk {
	drive    = 3
	type     = "auto"
	optional = 1
	file     = "fd3.image"
	file     = "fd3.psi"
	file     = "fd3.img"
}

disk {
	drive    = 4
	type     = "auto"
	optional = 1
	file     = "fd4.image"
	file     = "fd4.psi"
	file     = "fd4.img"
}
