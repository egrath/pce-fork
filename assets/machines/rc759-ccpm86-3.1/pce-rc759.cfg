# pce-rc759.cfg

path = "."
path = "data/rom"

cfg.model    ?= 1
cfg.speed    ?= 1
cfg.ram      ?= 384K
cfg.fastboot ?= 0
cfg.hires    ?= 0

if (cfg.model == 2) {
	cfg.prom ?= "rc759-2-4.0.rom"
}
else {
	cfg.prom  ?= "rc759-1-2.1.rom"
}

system {
	model        = cfg.model
	speed        = cfg.speed

	rtc          = 1

	fastboot     = cfg.fastboot

	nvm          = "nvm.dat"
	sanitize_nvm = 1

	parport1     = "stdio:file=parport1.out:flush=1"
	parport2     = "stdio:file=parport2.out:flush=1"
}

video {
	mono  = 0
	hires = cfg.hires
	min_h = 0
}

load {
	format  = "binary"
	address = 0xf8000
	file    = cfg.prom
}

ram {
	address = 0
	size    = cfg.ram
}

ram {
	address = 0xd0000
	size    = 32K
}

rom {
	address = 0xf0000
	size    = 64K
}

terminal {
	driver = "sdl"

#	escape = "CtrlRight"

	scale      = cfg.hires ? 1 : 2
	border     = 0
	fullscreen = 0

	aspect_x   = 4
	aspect_y   = 3

	min_w      = 512
	min_h      = 384

	mouse_mul_x = 1
	mouse_div_x = 1
	mouse_mul_y = 1
	mouse_div_y = 1

#	report_keys      = 1
#	keymap = "0x0061 = a"
#	keymap = "0x0062 = b"
}

terminal {
	driver = "x11"

#	escape = "CtrlRight"

	scale = 1

	aspect_x   = 4
	aspect_y   = 3

	mouse_mul_x = 1
	mouse_div_x = 1
	mouse_mul_y = 1
	mouse_div_y = 1
}

terminal {
	driver = "null"
}

speaker {
	volume      = 250
	lowpass     = 8000
	sample_rate = 44100
	driver      = "sdl:lowpass=0:wav=speaker.wav:wavfilter=0"
#	driver      = "oss:dev=/dev/dsp:lowpass=0:wav=speaker.wav:wavfilter=0"
}

disk {
	drive    = 0
	type     = "auto"
	optional = 1
	readonly = 0
	file     = "fd0.pri"
	file     = "fd0.psi"
	file     = "fd0.img"
}

disk {
	drive    = 1
	type     = "auto"
	optional = 1
	readonly = 0
	file     = "fd1.pri"
	file     = "fd1.psi"
	file     = "fd1.img"
}
