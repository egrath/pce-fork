# pce-mac.cfg

cfg.ram   ?= 4096K
cfg.sony  ?= 1
cfg.speed ?= 0

cfg.hd1_cow ?= 1
cfg.hd2_cow ?= 1
cfg.hd3_cow ?= 1
cfg.hd4_cow ?= 1

path = "."
path = "rom"

system {
	model   = "mac-se"
	memtest = 0
}

cpu {
	model = "68000"
	speed = cfg.speed
}

ram {
	address = 0x000000
	size    = cfg.ram
}

rom {
	file    = "mac-se.rom"
	address = 0x400000
	size    = 256K
}

if (cfg.sony) {
	rom {
		file    = "macplus-pcex.rom"
		address = 0xf80000
		size    = 16K
	}
}

adb {
	mouse         = true
	keyboard      = true
	keypad_motion = false
}

rtc {
	file      = "pce-mac-pram.dat"
	realtime  = 1
	appletalk = 0
}

if (cfg.sony) {
	sony {
		enable         = 1
		insert_delay   = 0
		insert_delay_1 = 0
	}
}

iwm {
	drive {
		drive        = 1
		disk         = 1
		inserted     = 0
		single_sided = 0
		auto_rotate  = 1
	}

	drive {
		drive        = 2
		disk         = 2
		inserted     = 0
		single_sided = 0
		auto_rotate  = 1
	}

	drive {
		drive        = 3
		disk         = 3
		inserted     = 0
		single_sided = 0
		auto_rotate  = 1
	}
}

serial {
	port = 0

#	driver = "null"
#	driver = "posix:file=ser1.out"
#	driver = "pty:symlink=ser1"
	driver = "stdio:file=ser1.out"
#	driver = "tcp:port=5556"
#	driver = "tios:file=/dev/ttyS0:log=ser1.log"
}

serial {
	port = 1

	driver = "stdio:file=ser2.out"
}

sound {
	lowpass = 8000

#	driver  = "oss:dev=/dev/dsp:lowpass=0:wav=sound.wav:wavfilter=0"
	driver  = "sdl:lowpass=0"
}

terminal {
	driver = "sdl"

#	escape = "CtrlRight"

	scale  = 2
	border = 0

	aspect_x = 3
	aspect_y = 2
}

terminal {
	driver = "x11"

#	escape = "CtrlRight"

	scale = 2

	aspect_x = 3
	aspect_y = 2
}

scsi {
	device {
		id    = 6
		drive = 0x80
	}

	device {
		id    = 1
		drive = 0x81
	}

	device {
		id    = 2
		drive = 0x82
	}

	device {
		id    = 3
		drive = 0x83
	}
}

disk {
	drive    = 1
	type     = "auto"
	optional = 1
	file     = "fd1.pri"
	file     = "fd1.woz"
	file     = "fd1.image"
	file     = "fd1.psi"
	file     = "fd1.img"
}

disk {
	drive    = 2
	type     = "auto"
	optional = 1
	file     = "fd2.pri"
	file     = "fd2.woz"
	file     = "fd2.image"
	file     = "fd2.psi"
	file     = "fd2.img"
}

disk {
	drive    = 3
	type     = "auto"
	optional = 1
	file     = "fd3.pri"
	file     = "fd3.woz"
	file     = "fd3.image"
	file     = "fd3.psi"
	file     = "fd3.img"
}

disk {
	drive    = 4
	type     = "auto"
	optional = 1
	file     = "fd4.image"
	file     = "fd4.psi"
	file     = "fd4.img"
}

disk {
	drive    = 5
	type     = "auto"
	optional = 1
	file     = "fd5.image"
	file     = "fd5.psi"
	file     = "fd5.img"
}

disk {
	drive    = 6
	type     = "auto"
	optional = 1
	file     = "fd6.image"
	file     = "fd6.psi"
	file     = "fd6.img"
}

disk {
	drive    = 7
	type     = "auto"
	optional = 1
	file     = "fd7.image"
	file     = "fd7.psi"
	file     = "fd7.img"
}

disk {
	drive    = 8
	type     = "auto"
	optional = 1
	file     = "fd8.image"
	file     = "fd8.psi"
	file     = "fd8.img"
}

disk {
	drive    = 0x80
	type     = "auto"
	optional = 1
	file     = "hd1.pbi"
	file     = "hd1.img"

	if (cfg.hd1_cow) {
		cow = "hd1.cow"
	}
}

disk {
	drive    = 0x81
	type     = "auto"
	optional = 1
	file     = "hd2.pbi"
	file     = "hd2.img"

	if (cfg.hd2_cow) {
		cow = "hd2.cow"
	}
}

disk {
	drive    = 0x82
	type     = "auto"
	optional = 1
	file     = "hd3.pbi"
	file     = "hd3.img"

	if (cfg.hd3_cow) {
		cow = "hd3.cow"
	}
}

disk {
	drive    = 0x83
	type     = "auto"
	optional = 1
	file     = "hd4.pbi"
	file     = "hd4.img"

	if (cfg.hd4_cow) {
		cow = "hd4.cow"
	}
}
