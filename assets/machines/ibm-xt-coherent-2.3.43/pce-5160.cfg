# pce-5160.cfg

cfg.cpu     ?= "8088"
cfg.speed   ?= 4
cfg.ram     ?= 640K
cfg.memtest ?= 0
cfg.boot    ?= 128

cfg.bios     ?= "ibm-xt-1982-11-08.rom"
cfg.ega_bios ?= "ibm-ega-1984-09-13.rom"
cfg.vga_bios ?= "ibm-vga-1986-10-27.rom"

cfg.fdc          ?= true
cfg.fdc.accurate ?= true
cfg.fdc.eot      ?= false
cfg.fdd          ?= 4

cfg.hdc          ?= !cfg.pcex
cfg.hdc.bios     ?= "ibm-mfm-1985-10-28.rom"
cfg.hdc.switches ?= 0x00
cfg.hd0.cow      ?= false
cfg.hd1.cow      ?= false

cfg.ser1.driver  ?= "stdio:file=ser1.out:flush=1"
cfg.ser2.driver  ?= "stdio:file=ser2.out:flush=1"

cfg.par1.driver  ?= "stdio:file=par1.out:flush=1"

cfg.speaker.driver ?= "sdl:lowpass=0"

#-----------------------------------------------------------------------

cfg.pcex.addr = 0xcf000

path = "."
path = "data/rom"

include "data/pce-ibmpc.inc"

system {
	model = "5160"

	boot = cfg.boot
	rtc  = 1

	memtest = cfg.memtest

	floppy_disk_drives = cfg.fdd

	patch_bios_init  = 1
	patch_bios_int19 = 1
}

rom {
	address = 0xcf000
	size    = 4K
	default = 0xff
}

rom {
	address = 0xf0000
	size    = 64K
	default = 0xff
}

load {
	format  = "binary"
	address = 0xf0000
	file    = cfg.bios
}
