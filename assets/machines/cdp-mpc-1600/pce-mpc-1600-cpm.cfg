# pce-mpc-1600-cpm.cfg
#
# Columbia Data Products MPC 1600 with CP/M-86 1.1

path = "."
path = "data/rom"

system {
	model = "5150"

	boot = 0
	rtc  = 1

	memtest = 1

	floppy_disk_drives = 2

	patch_bios_init  = 0
	patch_bios_int19 = 0
}

cpu {
	model = "8088"
	speed = 1
}

load {
	format  = "binary"
	address = 0xfd000
	file    = "cdp-1983-4.34.rom"
}

ram {
	address = 0
	size    = 256K
}

rom {
	address = 0xf8000
	size    = 32K
}

terminal {
	driver = "sdl"

#	escape = "CtrlRight"

	scale      = 1
	border     = 0
	fullscreen = 0
		
	mouse_mul_x = 1
	mouse_div_x = 1
	mouse_mul_y = 1
	mouse_div_y = 1
}

terminal {
	driver = "x11"

#	escape = "CtrlRight"

	scale = 1

	mouse_mul_x = 1
	mouse_div_x = 1
	mouse_mul_y = 1
	mouse_div_y = 1
}

terminal {
	driver = "null"
}

video {
	device = "cga"
	font   = 0
	blink  = 30
}

video {
	device = "mda"
	color  = "green"
	blink  = 30
}

speaker {
	volume      = 250
	lowpass     = 8000
	sample_rate = 44100

#	driver      = "oss:dev=/dev/dsp:lowpass=5000:wav=speaker.wav:wavfilter=0"
	driver      = "sdl:lowpass=5000"
}

serial {
	uart      = "8250"
	address   = 0x3f8
	irq       = 4
	multichar = 1

#	driver = "null"
#	driver = "posix:file=ser1.out:read=ser1.out:write=ser1.out"
#	driver = "pty:symlink=ser1"
	driver = "stdio:file=ser1.out:flush=1"
#	driver = "tcp:port=5556"
#	driver = "tios:file=/dev/ttyS0"
#	driver = "ppp:if=tun0:host-ip=192.168.2.1:guest-ip=192.168.2.10"
}

parport {
	address = 0x378
	driver  = "stdio:file=par1.out:flush=1"
}

parport {
	address = 0x278
	driver  = "stdio:file=par2.out:flush=1"
}

fdc {
	address = 0x3f0
	irq     = 6

	drive0 = 0x00
	drive1 = 0x01
	drive2 = 0x02
	drive3 = 0x03

	accurate = 1
}

disk {
	drive    = 0x00
	type     = "auto"
	file     = "cpm-fd0.psi"
	file     = "cpm-fd0.img"
	optional = 0
}

disk {
	drive    = 0x01
	type     = "auto"
	file     = "cpm-fd1.psi"
	file     = "cpm-fd1.img"
	optional = 1
}

disk {
	drive    = 0x02
	type     = "auto"
	file     = "cpm-fd2.psi"
	file     = "cpm-fd2.img"
	optional = 1
}

disk {
	drive    = 0x03
	type     = "auto"
	file     = "cpm-fd3.psi"
	file     = "cpm-fd3.img"
	optional = 1
}
